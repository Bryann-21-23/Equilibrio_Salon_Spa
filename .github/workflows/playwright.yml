name: Pruebas de Calidad (Playwright)
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm install --prefix equilibrio
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium --prefix equilibrio
    - name: Run Playwright tests
      run: npx playwright test --prefix equilibrio
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: equilibrio/playwright-report/
        retention-days: 30
