<header>
  <div class="header-logo">
    <svg viewBox="0 0 120 45" width="110" xmlns="http://www.w3.org/2000/svg">
      <g transform="translate(55,4)">
        <path d="M5,15 Q18,-5 35,-2 Q22,10 5,15Z" fill="#7ab832"/>
        <path d="M5,15 Q-2,2 12,-4 Q13,8 5,15Z" fill="#5a9e2f"/>
      </g>
      <text x="6" y="32" font-family="Palatino Linotype,Palatino,serif" font-size="20" font-style="italic" fill="#111">Equilibrio</text>
      <line x1="6" y1="35" x2="114" y2="35" stroke="#5a9e2f" stroke-width="1"/>
      <text x="18" y="43" font-family="Arial,sans-serif" font-size="6" font-weight="600" fill="#444" letter-spacing="3">SALON &amp; SPA</text>
    </svg>
  </div>
  <div class="header-right">
    <span class="role-badge" [class.admin]="isAdmin()">{{ roleLabel() }}</span>
    <span class="username">{{ username() }}</span>
    <button class="btn-logout" (click)="logout()">Salir</button>
  </div>
</header>

<nav class="tabs">
  <a class="tab" routerLink="/visualizar" routerLinkActive="active">
    📊 Visualizar datos
  </a>
  <a class="tab" routerLink="/registrar" routerLinkActive="active">
    ✏️ Registrar servicio
  </a>
  <a class="tab" routerLink="/registrar-usuarios" routerLinkActive="active">
    👤 Registrar Usuarios
  </a>
  <a class="tab" routerLink="/visualizar-usuarios" routerLinkActive="active">
    👥 Lista de Usuarios
  </a>
  @if (isAdmin()) {
    <a class="tab" routerLink="/admin" routerLinkActive="active">
      ⚙️ Administración
    </a>
  }
</nav>

<main>
  <router-outlet />
</main>
