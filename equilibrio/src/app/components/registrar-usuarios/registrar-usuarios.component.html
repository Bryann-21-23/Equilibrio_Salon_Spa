<div class="form-card">
  <div class="form-title">Registrar Usuario</div>

  <div class="field">
    <label>Nombre *</label>
    <input type="text" [ngModel]="nombre()" (ngModelChange)="nombre.set($event)" placeholder="Ej. Ana">
  </div>

  <div class="field">
    <label>Apellido</label>
    <input type="text" [ngModel]="apellido()" (ngModelChange)="apellido.set($event)" placeholder="Ej. Pérez">
  </div>

  <div class="field">
    <label>Cumpleaños</label>
    <input type="date" [ngModel]="cumpleanos()" (ngModelChange)="cumpleanos.set($event)">
  </div>

  <div class="field">
    <label>Correo electrónico</label>
    <input type="email" [ngModel]="correo()" (ngModelChange)="correo.set($event)" placeholder="ana@ejemplo.com">
  </div>

  <div class="field">
    <label>Celular</label>
    <input type="tel" [ngModel]="celular()" (ngModelChange)="celular.set($event)" placeholder="987654321">
  </div>

  <button class="btn-primary" (click)="submit()">+ Registrar Usuario</button>

  @if (msg()) {
    <p [class]="msgOk() ? 'msg ok' : 'msg err'">{{ msg() }}</p>
  }
</div>
