<div class="admin-wrap">

  <!-- SECCIÓN DE EXPORTACIÓN Y BACKUP -->
  <div class="section backup-section">
    <div class="section-title">Centro de Control de Datos</div>
    <p class="section-desc">Gestiona tus datos para análisis externos o copias de seguridad locales.</p>
    <div class="backup-actions">
      <button class="btn-action excel" (click)="exportToExcel()">
        📊 Exportar a Excel (.xlsx)
      </button>
      <button class="btn-action ai" (click)="exportForAI()">
        🤖 Preparar para IA (.json)
      </button>
    </div>
  </div>

  <!-- FORMULARIO DE CREACIÓN DE USUARIOS -->
  <div class="section">
    <div class="section-title">Crear nuevo usuario del sistema</div>
    <div class="create-form">
      <div class="form-row">
        <div class="field">
          <label>Usuario</label>
          <input type="text" [ngModel]="newUser()" (ngModelChange)="newUser.set($event)" placeholder="nombre_usuario">
        </div>
        <div class="field">
          <label>Contraseña</label>
          <input type="password" [ngModel]="newPass()" (ngModelChange)="newPass.set($event)" placeholder="••••••">
        </div>
        <div class="field">
          <label>Rol</label>
          <select [ngModel]="newRole()" (ngModelChange)="newRole.set($event)">
            <option value="user">Empleada</option>
            <option value="admin">Administrador</option>
          </select>
        </div>
        <button class="btn-create" (click)="create()">Crear usuario</button>
      </div>
      @if (msg()) {
        <p [class]="msgOk() ? 'msg ok' : 'msg err'">{{ msg() }}</p>
      }
    </div>
  </div>

</div>
