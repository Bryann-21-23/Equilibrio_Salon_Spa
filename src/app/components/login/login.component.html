<div class="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <svg viewBox="0 0 220 90" xmlns="http://www.w3.org/2000/svg" width="240">
        <g transform="translate(100,8)">
          <path d="M10,30 Q30,-10 60,-5 Q40,20 10,30Z" fill="#7ab832"/>
          <path d="M10,30 Q-5,5 20,-8 Q25,15 10,30Z" fill="#5a9e2f"/>
          <path d="M10,30 Q35,10 55,20 Q35,30 10,30Z" fill="#8bc34a" opacity="0.7"/>
        </g>
        <text x="12" y="62" font-family="Palatino Linotype,Palatino,serif" font-size="36" font-style="italic" fill="#111">Equilibrio</text>
        <line x1="12" y1="68" x2="208" y2="68" stroke="#5a9e2f" stroke-width="1.5"/>
        <text x="30" y="82" font-family="Arial,sans-serif" font-size="11" font-weight="600" fill="#333" letter-spacing="4">SALON &amp; SPA</text>
      </svg>
      <p class="tagline">salud, belleza y bienestar</p>
    </div>

    <h2 class="login-title">Iniciar sesión</h2>

    <div class="field">
      <label>Usuario</label>
      <input type="text" [ngModel]="username()" (ngModelChange)="username.set($event)"
             placeholder="Ingresa tu usuario" (keydown)="onKey($event)">
    </div>
    <div class="field password-field">
      <label>Contraseña</label>
      <div class="input-container">
        <input [type]="showPassword() ? 'text' : 'password'" [ngModel]="password()" (ngModelChange)="password.set($event)"
               placeholder="••••••••" (keydown)="onKey($event)">
        <button type="button" class="btn-toggle-password" (click)="togglePassword()" aria-label="Mostrar contraseña">
          @if (showPassword()) {
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
              <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          }
        </button>
      </div>
    </div>

    <button class="btn-primary" (click)="doLogin()">Ingresar</button>

    @if (error()) {
      <p class="login-error">{{ error() }}</p>
    }
  </div>
</div>
